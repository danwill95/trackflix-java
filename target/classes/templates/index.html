<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackflix - Gerenciador de Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container mt-4">
    <h1 class="text-center mb-4">🎬 Trackflix</h1>

    <!-- Formulário de Adição -->
    <div class="card mb-4">
        <div class="card-header">
            <h5>Adicionar Filme/Série</h5>
        </div>
        <div class="card-body">
            <form id="movieForm">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <input type="text" id="title" class="form-control" placeholder="Título" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <input type="text" id="genre" class="form-control" placeholder="Gênero">
                    </div>
                    <div class="col-md-2 mb-3">
                        <select id="status" class="form-control">
                            <option value="Pendente">Pendente</option>
                            <option value="Assistindo">Assistindo</option>
                            <option value="Assistido">Assistido</option>
                        </select>
                    </div>
                    <div class="col-md-2 mb-3">
                        <select id="rating" class="form-control">
                            <option value="0">⭐ Avaliação</option>
                            <option value="1">⭐</option>
                            <option value="2">⭐⭐</option>
                            <option value="3">⭐⭐⭐</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="5">⭐⭐⭐⭐⭐</option>
                        </select>
                    </div>
                    <div class="col-md-1 mb-3">
                        <button type="submit" class="btn btn-primary w-100">Adicionar</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <textarea id="notes" class="form-control" rows="2" placeholder="Notas/Comentários"></textarea>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Filtros -->
    <div class="row mb-4">
        <div class="col-md-3">
            <input type="text" id="filterTitle" class="form-control" placeholder="Filtrar por título">
        </div>
        <div class="col-md-3">
            <input type="text" id="filterGenre" class="form-control" placeholder="Filtrar por gênero">
        </div>
        <div class="col-md-3">
            <select id="filterStatus" class="form-control">
                <option value="">Todos os status</option>
                <option value="Pendente">Pendente</option>
                <option value="Assistindo">Assistindo</option>
                <option value="Assistido">Assistido</option>
            </select>
        </div>
        <div class="col-md-3">
            <select id="filterRating" class="form-control">
                <option value="">Todas as avaliações</option>
                <option value="1">⭐ 1+</option>
                <option value="2">⭐⭐ 2+</option>
                <option value="3">⭐⭐⭐ 3+</option>
                <option value="4">⭐⭐⭐⭐ 4+</option>
                <option value="5">⭐⭐⭐⭐⭐ 5</option>
            </select>
        </div>
    </div>

    <!-- Lista de Filmes -->
    <div id="moviesList" class="row">
        <!-- Os filmes serão carregados via JavaScript -->
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
